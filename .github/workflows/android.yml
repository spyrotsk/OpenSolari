name: Build Android Client

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Install MAUI Workloads
      run: dotnet workload restore OpenSolAndroid/OpenSolAndroid.csproj

    - name: Restore Dependencies
      run: dotnet restore OpenSolAndroid/OpenSolAndroid.csproj

    - name: Build Android
      run: dotnet build OpenSolAndroid/OpenSolAndroid.csproj -c Release -f net10.0-android

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-client
        path: OpenSolAndroid/bin/Release/net10.0-android/*-Signed.apk

    - name: Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: OpenSolAndroid/bin/Release/net10.0-android/*-Signed.apk
