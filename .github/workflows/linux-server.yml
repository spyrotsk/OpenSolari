name: Build OpenSolLinuxServer

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore Dependencies
      run: dotnet restore OpenSolLinuxServer/OpenSolLinuxServer.csproj

    - name: Publish Linux Server
      run: dotnet publish OpenSolLinuxServer/OpenSolLinuxServer.csproj -c Release -r linux-x64 -p:PublishSingleFile=true --self-contained true -o ./linux-publish

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-server-build
        path: linux-publish/OpenSolLinuxServer

    - name: Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: linux-publish/OpenSolLinuxServer
