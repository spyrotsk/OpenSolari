name: Build Linux Client

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore Dependencies
      run: dotnet restore OpenSolariLinux/OpenSolariLinux.csproj

    - name: Publish Linux Client
      run: dotnet publish OpenSolariLinux/OpenSolariLinux.csproj -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=true -o ./linux-client-publish

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-client-build
        path: linux-client-publish/OpenSolariLinux

    - name: Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: linux-client-publish/OpenSolariLinux
